<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="360" viewBox="0 0 1280 360" role="img" aria-labelledby="title desc">
  <title id="title">ConceptOps workflow</title>
  <desc id="desc">A rough request moves through context, options, validation, decision, and selected outputs.</desc>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#314059" stroke-width="1" opacity=".34"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0l10 5-10 5z" fill="#F4F1E8"/>
    </marker>
  </defs>

  <rect width="1280" height="360" rx="28" fill="#0B1220"/>
  <rect width="1280" height="360" rx="28" fill="url(#grid)"/>

  <text x="56" y="64" fill="#F4F1E8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="17" font-weight="700" letter-spacing="3">THE CONCEPTOPS ROUTE</text>
  <text x="56" y="91" fill="#9CA9BC" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15">Start with what is known. Mark what is not. Build only what earns the next step.</text>

  <path d="M103 203H1171" fill="none" stroke="#F4F1E8" stroke-width="2" stroke-dasharray="4 10" marker-end="url(#arrow)" opacity=".72"/>

  <g transform="translate(56 141)">
    <circle cx="46" cy="62" r="44" fill="#111C30" stroke="#F4F1E8" stroke-width="2"/>
    <path d="M15 63c13-21 22 19 35-1 9-13 17-9 27-1" fill="none" stroke="#F4F1E8" stroke-width="4" stroke-linecap="round"/>
    <text x="46" y="132" text-anchor="middle" fill="#D7FF64" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="800" letter-spacing="2">ASK</text>
    <text x="46" y="153" text-anchor="middle" fill="#9CA9BC" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12">language + request</text>
  </g>

  <g transform="translate(286 141)">
    <circle cx="46" cy="62" r="44" fill="#111C30" stroke="#7AB8FF" stroke-width="2"/>
    <circle cx="46" cy="62" r="20" fill="none" stroke="#7AB8FF" stroke-width="2"/>
    <path d="M46 24v18M46 82v18M8 62h18M66 62h18" stroke="#F4F1E8" stroke-width="3" stroke-linecap="round"/>
    <circle cx="46" cy="62" r="5" fill="#7AB8FF"/>
    <text x="46" y="132" text-anchor="middle" fill="#7AB8FF" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="800" letter-spacing="2">MAP</text>
    <text x="46" y="153" text-anchor="middle" fill="#9CA9BC" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12">project + evidence</text>
  </g>

  <g transform="translate(516 141)">
    <circle cx="46" cy="62" r="44" fill="#111C30" stroke="#F4F1E8" stroke-width="2"/>
    <path d="M24 47h44M24 62h33M24 77h22" stroke="#F4F1E8" stroke-width="4" stroke-linecap="round"/>
    <circle cx="72" cy="47" r="5" fill="#D7FF64"/>
    <circle cx="61" cy="62" r="5" fill="#7AB8FF"/>
    <circle cx="50" cy="77" r="5" fill="#FF9D66"/>
    <text x="46" y="132" text-anchor="middle" fill="#F4F1E8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="800" letter-spacing="2">COMPARE</text>
    <text x="46" y="153" text-anchor="middle" fill="#9CA9BC" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12">reuse + options</text>
  </g>

  <g transform="translate(746 141)">
    <circle cx="46" cy="62" r="44" fill="#111C30" stroke="#FF9D66" stroke-width="2"/>
    <path d="M46 35l27 27-27 27-27-27z" fill="none" stroke="#FF9D66" stroke-width="3"/>
    <circle cx="46" cy="62" r="7" fill="#FF9D66"/>
    <text x="46" y="132" text-anchor="middle" fill="#FF9D66" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="800" letter-spacing="2">DECIDE</text>
    <text x="46" y="153" text-anchor="middle" fill="#9CA9BC" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12">Go / Conditional / Freeze</text>
  </g>

  <g transform="translate(976 141)">
    <circle cx="46" cy="62" r="44" fill="#111C30" stroke="#D7FF64" stroke-width="2"/>
    <rect x="20" y="42" width="30" height="38" rx="3" fill="#F4F1E8"/>
    <rect x="32" y="34" width="30" height="38" rx="3" fill="#7AB8FF"/>
    <rect x="44" y="26" width="30" height="38" rx="3" fill="#D7FF64"/>
    <text x="46" y="132" text-anchor="middle" fill="#D7FF64" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="800" letter-spacing="2">MAKE</text>
    <text x="46" y="153" text-anchor="middle" fill="#9CA9BC" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12">selected outputs + summary</text>
  </g>

  <g transform="translate(1178 181)">
    <circle cx="24" cy="22" r="20" fill="#111C30" stroke="#D7FF64" stroke-width="2"/>
    <circle cx="24" cy="22" r="7" fill="#D7FF64"/>
  </g>
</svg>
