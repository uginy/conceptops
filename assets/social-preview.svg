<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">ConceptOps social preview</title>
  <desc id="desc">ConceptOps turns a rough idea into a researched decision and usable outputs.</desc>
  <rect width="1280" height="640" fill="#0B1220"/>
  <image href="conceptops-hero.webp" x="0" y="40" width="1280" height="560" preserveAspectRatio="xMidYMid slice" opacity=".62"/>
  <rect x="0" y="0" width="670" height="640" fill="#0B1220" opacity=".92"/>
  <rect x="64" y="72" width="66" height="66" rx="16" fill="#0B1220" stroke="#F4F1E8" stroke-width="2"/>
  <path d="M78 106c7-12 14 12 24 0 5-7 9-6 14-2" fill="none" stroke="#F4F1E8" stroke-width="4" stroke-linecap="round"/>
  <path d="M113 103h10M123 103v-12M123 103v12" fill="none" stroke="#7AB8FF" stroke-width="3" stroke-linecap="round"/>
  <rect x="117" y="97" width="12" height="12" transform="rotate(45 123 103)" fill="#FF9D66"/>
  <text x="64" y="257" fill="#F4F1E8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="82" font-weight="800" letter-spacing="-3">ConceptOps</text>
  <text x="68" y="308" fill="#D7FF64" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20" font-weight="700" letter-spacing="2">ROUGH IDEA  >  CLEAR NEXT STEP</text>
  <text x="68" y="386" fill="#F4F1E8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="29">Research the context. Compare the options.</text>
  <text x="68" y="426" fill="#F4F1E8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="29">Build only what the decision needs.</text>
  <rect x="68" y="500" width="160" height="46" rx="23" fill="#D7FF64"/>
  <text x="148" y="529" text-anchor="middle" fill="#0B1220" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="800">OPEN AGENT SKILL</text>
  <text x="250" y="529" fill="#9CA9BC" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16">RESEARCH  /  DECIDE  /  DELIVER</text>
</svg>
